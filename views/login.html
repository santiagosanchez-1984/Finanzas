<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>💰 Finanzas — Ingresar</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f4ed;
  color: #1a1a2e;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(21,87,36,.15);
  padding: 40px 36px;
  width: 100%;
  max-width: 380px;
  text-align: center;
}

.login-icon {
  font-size: 48px;
  width: 84px; height: 84px;
  margin: 0 auto 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, #14532d, #1e7a3f);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 16px rgba(20,83,45,.35);
}

.login-card h1 { font-size: 20px; font-weight: 700; color: #14532d; margin-bottom: 4px; }
.login-card p  { font-size: 13px; color: #888; margin-bottom: 26px; }

.google-btn {
  width: 100%; padding: 12px; margin-top: 6px;
  background: #fff; color: #1f2937; border: 1.5px solid #d6dde6; border-radius: 8px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: background .15s, border-color .15s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  text-decoration: none;
}
.google-btn:hover { background: #f8fafc; border-color: #1e7a3f; }

.login-error {
  display: none;
  background: #FDECEA; color: #C62828;
  font-size: 13px; font-weight: 600;
  padding: 10px 12px; border-radius: 8px;
  margin-bottom: 16px;
}
.login-error.show { display: block; }

.login-footer { margin-top: 22px; font-size: 11px; color: #aaa; }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-icon">💰</div>
  <h1>Finanzas Personales</h1>
  <p>Ingresá con tu cuenta de Google para ver tus cuentas e inversiones</p>

  <div class="login-error" id="login-error"></div>

  <a class="google-btn" href="/api/oauth?action=start">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.09-1.8 2.73v2.27h2.91c1.7-1.57 2.69-3.87 2.69-6.64z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.27c-.81.54-1.84.86-3.05.86-2.34 0-4.33-1.58-5.04-3.71H.96v2.33C2.44 15.98 5.48 18 9 18z"/><path fill="#FBBC05" d="M3.96 10.7c-.18-.54-.28-1.11-.28-1.7s.1-1.16.28-1.7V4.97H.96C.35 6.19 0 7.55 0 9s.35 2.81.96 4.03l3-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.97l3 2.33C4.67 5.16 6.66 3.58 9 3.58z"/></svg>
    Iniciar sesión con Google
  </a>

  <div class="login-footer">Información financiera personal — acceso restringido</div>
</div>

<script>
var params = new URLSearchParams(location.search);
var error = params.get('error');
if (error) {
  var mensajes = {
    sin_acceso: 'Tu cuenta de Google no está habilitada para entrar acá. Pedile acceso al administrador.',
    google_cancelado: 'Se canceló el inicio de sesión con Google.',
    google_token: 'No se pudo validar la sesión con Google. Probá de nuevo.',
    google_invalido: 'La respuesta de Google no pudo verificarse. Probá de nuevo.',
  };
  var el = document.getElementById('login-error');
  el.textContent = '❌ ' + (mensajes[error] || 'Ocurrió un error al iniciar sesión.');
  el.classList.add('show');
}
</script>

</body>
</html>
